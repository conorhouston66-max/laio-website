<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1584px; height: 396px; overflow: hidden; background: #0A0908; }

  .banner {
    width: 1584px;
    height: 396px;
    background: #0A0908;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 100px;
  }

  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 44px 44px;
  }

  .accent-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, rgba(200,150,12,0.3) 30%, #C8960C 60%, rgba(200,150,12,0.2) 100%);
  }

  .glow {
    position: absolute;
    right: -80px; top: -80px;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(200,150,12,0.12) 0%, transparent 65%);
    pointer-events: none;
  }

  /* Logo pinned top-left */
  .logo-corner {
    position: absolute;
    top: 30px;
    left: 50px;
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 3;
  }

  .brand {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,255,255,0.28);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .sep {
    width: 1px;
    height: 16px;
    background: rgba(255,255,255,0.1);
  }

  .tag {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: rgba(200,150,12,0.7);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Main content — right side */
  .content {
    position: relative;
    z-index: 2;
    text-align: right;
    max-width: 880px;
  }

  .headline {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 80px;
    font-weight: 800;
    color: #FFFFFF;
    line-height: 1.05;
    letter-spacing: -0.035em;
    margin-bottom: 22px;
  }

  .headline em {
    font-style: italic;
    color: #C8960C;
  }

  .sub {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 18px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .pills {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .pill {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 7px 16px;
    border-radius: 100px;
  }

  .pill.amber {
    color: #C8960C;
    border-color: rgba(200,150,12,0.35);
  }
</style>
</head>
<body>
<div class="banner">
  <div class="grid"></div>
  <div class="accent-line"></div>
  <div class="glow"></div>

  <!-- Logo top-left -->
  <div class="logo-corner">
    <svg width="42" height="30" viewBox="0 0 44 32" fill="none">
      <path d="M2 9 L2 2 L9 2" stroke="#C8960C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M35 2 L42 2 L42 9" stroke="#C8960C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M2 23 L2 30 L9 30" stroke="#C8960C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M35 30 L42 30 L42 23" stroke="#C8960C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 8 L12 24 L20 24" stroke="#FFFFFF" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M22 24 L27 8 L32 24" stroke="#FFFFFF" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="23.4" y1="19" x2="30.6" y2="19" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <span class="brand">Lead Acquisition</span>
    <div class="sep"></div>
    <span class="tag">B2B Cold Email Agency</span>
  </div>

  <!-- Main content right-aligned -->
  <div class="content">
    <div class="headline">
      Outbound is a science.<br><em>We run the lab.</em>
    </div>
    <div class="sub">15+ campaigns per client. Data decides what scales.</div>
    <div class="pills">
      <span class="pill amber">Signal-based targeting</span>
      <span class="pill">Done for you</span>
      <span class="pill">leadacquisition.io</span>
    </div>
  </div>

</div>
</body>
</html>
